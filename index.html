<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Can we in relationship?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: pink;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            color: #e91e63;
            transform: translateY(-40px);
        }

        .btn {
            width: 120px;
            height: 44px;
            /* cố định chiều cao cho đều */
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            position: absolute;
            transition: 0.2s;
        }

        /* Căn giữa cụm 2 nút */
        #yesBtn {
            background: #4caf50;
            color: white;
            left: 50%;
            top: 55%;
            transform: translateX(-110%);
        }

        #noBtn {
            background: #f44336;
            color: white;
            left: 50%;
            top: 55%;
            transform: translateX(10%);
        }

        #memePage {
            display: none;
            cursor: pointer;
            background: rgba(255, 192, 203, 0.95);
        }

        #memePage img {
            width: 300px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: fly 2s linear forwards;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-200px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="mainPage">
        <h1>Can we in relationship? 🌹</h1>
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>
    </div>

    <div class="container" id="memePage">
        <h1>Stop messing with me! 😾</h1>
        <!-- Thay link ảnh nếu muốn -->
        <img src="https://i.ibb.co/MxJMMTPT/troll.jpg" alt="troll">
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const mainPage = document.getElementById("mainPage");
        const memePage = document.getElementById("memePage");

        let moveCount = 0;
        let specialMode = false;

        const defaultYesPos = { left: "50%", top: "55%", transform: "translateX(-110%)" };
        const defaultNoPos = { left: "50%", top: "55%", transform: "translateX(10%)" };

        function randomPosition(btn) {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = x + "px";
            btn.style.top = y + "px";
            btn.style.transform = "translate(0,0)";
        }

        noBtn.addEventListener("mouseenter", () => {
            if (!specialMode) {
                randomPosition(noBtn);
                moveCount++;

                if (moveCount >= 5) {
                    mainPage.style.display = "none";
                    memePage.style.display = "flex";
                }
            } else {
                // Sau khi quay lại: Yes đổi chỗ với No
                const yesLeft = yesBtn.style.left;
                const yesTop = yesBtn.style.top;
                const yesTransform = yesBtn.style.transform;

                yesBtn.style.left = noBtn.style.left;
                yesBtn.style.top = noBtn.style.top;
                yesBtn.style.transform = noBtn.style.transform;

                noBtn.style.left = yesLeft;
                noBtn.style.top = yesTop;
                noBtn.style.transform = yesTransform;

                randomPosition(noBtn);
            }
        });

        memePage.addEventListener("click", () => {
            memePage.style.display = "none";
            mainPage.style.display = "flex";
            moveCount = 0;
            specialMode = true;

            // reset vị trí ban đầu + hiện lại nút
            yesBtn.style.left = defaultYesPos.left;
            yesBtn.style.top = defaultYesPos.top;
            yesBtn.style.transform = defaultYesPos.transform;

            noBtn.style.left = defaultNoPos.left;
            noBtn.style.top = defaultNoPos.top;
            noBtn.style.transform = defaultNoPos.transform;

            yesBtn.style.display = "block";
            noBtn.style.display = "block";
        });

        // Mưa tim 5s khi bấm Yes
        yesBtn.addEventListener("click", () => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const start = Date.now();
            const interval = setInterval(() => {
                // mỗi đợt tạo 1–2 trái tim
                const count = Math.floor(Math.random() * 2) + 1;

                for (let i = 0; i < count; i++) {
                    const heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerText = "💖";

                    // random 5–7 vị trí quanh tâm (bán kính ~40px)
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 20 + Math.random() * 40;

                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    heart.style.left = x + "px";
                    heart.style.top = y + "px";

                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }

                if (Date.now() - start > 5000) {
                    clearInterval(interval);
                }
            }, 120);

            // Ẩn 2 nút sau khi bấm Yes
            yesBtn.style.display = "none";
            noBtn.style.display = "none";
        });
    </script>

</body>

</html>
