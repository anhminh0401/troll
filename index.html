<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Can we in relationship?</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: pink;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1 {
            color: #e91e63;
            transform: translateY(-60px);
        }

        .btn {
            width: 120px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
            position: absolute;
            transition: 0.15s;
            touch-action: manipulation;
        }

        #yesBtn {
            background: #4caf50;
            color: white;
            left: 50%;
            top: 55%;
            transform: translateX(-110%);
        }

        #noBtn {
            background: #f44336;
            color: white;
            left: 50%;
            top: 55%;
            transform: translateX(10%);
        }

        #memePage {
            display: none;
            cursor: pointer;
            background: rgba(255, 192, 203, 0.95);
        }

        #memePage img {
            width: 260px;
            max-width: 80vw;
            border-radius: 20px;
            margin: 20px 0;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            pointer-events: none;
            animation: fly 2s linear forwards;
        }

        @keyframes fly {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-200px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container" id="mainPage">
        <h1>Can we in relationship? 🌹</h1>
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>
    </div>

    <div class="container" id="memePage">
        <h1>Stop messing with me! 😾</h1>
        <img src="https://i.postimg.cc/xqCW1jdj/cat2.png" alt="cat" />
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const mainPage = document.getElementById("mainPage");
        const memePage = document.getElementById("memePage");

        let moveCount = 0;
        let specialMode = false;
        let lastNoPos = null;

        const defaultYesPos = { left: "50%", top: "55%", transform: "translateX(-110%)" };
        const defaultNoPos = { left: "50%", top: "55%", transform: "translateX(10%)" };

        const MIN_GAP = 120; // khoảng cách tối thiểu (px)

        function getCenter(btn) {
            const rect = btn.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        function distance(a, b) {
            return Math.hypot(a.x - b.x, a.y - b.y);
        }

        function randomPositionAvoid(btn, avoidBtn) {
            const btnW = btn.offsetWidth;
            const btnH = btn.offsetHeight;

            const maxX = window.innerWidth - btnW - 10;
            const maxY = window.innerHeight - btnH - 10;

            let x, y, tries = 0;

            do {
                x = Math.random() * maxX;
                y = Math.random() * maxY;
                tries++;
                if (tries > 20) break;
            } while (distance(
                { x: x + btnW / 2, y: y + btnH / 2 },
                getCenter(avoidBtn)
            ) < MIN_GAP);

            btn.style.left = x + "px";
            btn.style.top = y + "px";
            btn.style.transform = "translate(0,0)";

            lastNoPos = { x: x + btnW / 2, y: y + btnH / 2 };
        }

        function randomPositionFromLast(btn) {
            const btnW = btn.offsetWidth;
            const btnH = btn.offsetHeight;

            const maxX = window.innerWidth - btnW - 10;
            const maxY = window.innerHeight - btnH - 10;

            let x, y, tries = 0;

            do {
                x = Math.random() * maxX;
                y = Math.random() * maxY;
                tries++;
                if (tries > 20) break;
            } while (
                lastNoPos &&
                distance(
                    { x: x + btnW / 2, y: y + btnH / 2 },
                    lastNoPos
                ) < MIN_GAP
            );

            btn.style.left = x + "px";
            btn.style.top = y + "px";
            btn.style.transform = "translate(0,0)";

            lastNoPos = { x: x + btnW / 2, y: y + btnH / 2 };
        }

        function handleNoMove() {
            if (!specialMode) {
                randomPositionAvoid(noBtn, yesBtn);
                moveCount++;

                if (moveCount >= 3) {
                    mainPage.style.display = "none";
                    memePage.style.display = "flex";
                }
            } else {
                // đổi chỗ Yes <-> No
                const yesLeft = yesBtn.style.left;
                const yesTop = yesBtn.style.top;
                const yesTransform = yesBtn.style.transform;

                yesBtn.style.left = noBtn.style.left;
                yesBtn.style.top = noBtn.style.top;
                yesBtn.style.transform = noBtn.style.transform;

                noBtn.style.left = yesLeft;
                noBtn.style.top = yesTop;
                noBtn.style.transform = yesTransform;

                // No chạy xa vị trí cũ của chính nó
                randomPositionFromLast(noBtn);
            }
        }

        noBtn.addEventListener("mouseenter", handleNoMove);
        noBtn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            handleNoMove();
        });

        memePage.addEventListener("click", () => {
            memePage.style.display = "none";
            mainPage.style.display = "flex";
            moveCount = 0;
            specialMode = true;
            lastNoPos = null;

            yesBtn.style.left = defaultYesPos.left;
            yesBtn.style.top = defaultYesPos.top;
            yesBtn.style.transform = defaultYesPos.transform;

            noBtn.style.left = defaultNoPos.left;
            noBtn.style.top = defaultNoPos.top;
            noBtn.style.transform = defaultNoPos.transform;

            yesBtn.style.display = "block";
            noBtn.style.display = "block";
        });

        yesBtn.addEventListener("click", () => {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            const start = Date.now();
            const interval = setInterval(() => {
                const points = 5 + Math.floor(Math.random() * 3);

                for (let i = 0; i < points; i++) {
                    const heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerText = "💖";

                    const angle = Math.random() * Math.PI * 2;
                    const radius = 20 + Math.random() * 60;

                    heart.style.left = centerX + Math.cos(angle) * radius + "px";
                    heart.style.top = centerY + Math.sin(angle) * radius + "px";

                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }

                if (Date.now() - start > 5000) clearInterval(interval);
            }, 120);

            yesBtn.style.display = "none";
            noBtn.style.display = "none";
        });
    </script>

</body>

</html>
